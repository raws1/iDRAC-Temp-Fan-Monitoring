services:
  hddtemps:
    build: .
    container_name: hddtemps
    restart: unless-stopped
    ports:
      - "${PORT:-8789}:${PORT:-8789}"
    environment:
      NAS_HOST: "${NAS_HOST:-nas.example.internal}"
      NAS_USER: "${NAS_USER:-admin}"
      SSH_KEY_PATH: "/run/ssh/id_ed25519_hddtemps"
      SSH_KNOWN_HOSTS: "/run/ssh/known_hosts"
      PORT: "${PORT:-8789}"
      INTERVAL_SECONDS: "${INTERVAL_SECONDS:-60}"
      TZ: "${TZ:-America/New_York}"
      DISK_MAP: "${DISK_MAP:-3:HDD 1,4:HDD 2,5:HDD 3,6:HDD 4,7:HDD 5,8:HDD 6,9:HDD 7,10:HDD 8}"
      FAN_MAP: "${FAN_MAP:-0:Fan 1,1:Fan 2,2:Fan 3}"
      WINDOW_HOURS: "${WINDOW_HOURS:-24}"
      NOTIFICATION_EMAIL_ENABLED: "${NOTIFICATION_EMAIL_ENABLED:-false}"
      NOTIFICATION_TEMP_THRESHOLD_F: "${NOTIFICATION_TEMP_THRESHOLD_F:-125}"
      NOTIFICATION_SEND_TEST_EMAIL_ON_START: "${NOTIFICATION_SEND_TEST_EMAIL_ON_START:-false}"
      NOTIFICATION_EMAIL_STARTTLS: "${NOTIFICATION_EMAIL_STARTTLS:-true}"
      NOTIFICATION_EMAIL_FROM: "${NOTIFICATION_EMAIL_FROM:-alerts@example.com}"
      NOTIFICATION_EMAIL_TO: "${NOTIFICATION_EMAIL_TO:-ops@example.com}"
      NOTIFICATION_EMAIL_SERVER: "${NOTIFICATION_EMAIL_SERVER:-smtp.example.com}"
      NOTIFICATION_EMAIL_SERVER_PORT: "${NOTIFICATION_EMAIL_SERVER_PORT:-587}"
      NOTIFICATION_EMAIL_SERVER_USER: "${NOTIFICATION_EMAIL_SERVER_USER:-}"
      NOTIFICATION_EMAIL_SERVER_PASSWORD: "${NOTIFICATION_EMAIL_SERVER_PASSWORD:-}"
    volumes:
      - ./data:/data
      - /root/.ssh/id_ed25519_hddtemps:/run/ssh/id_ed25519_hddtemps:ro
      - /root/.ssh/known_hosts:/run/ssh/known_hosts:ro
